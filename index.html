    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* Hide number input arrows (spinners) */
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      input[type=number] {
        -moz-appearance: textfield;
      }

      /* Global styles for disabled fields */
      input:disabled, 
      select:disabled, 
      textarea:disabled {
        background-color: #f1f5f9 !important; /* bg-slate-100 */
        color: #94a3b8 !important;            /* text-slate-400 */
        border-color: #e2e8f0 !important;      /* border-slate-200 */
        cursor: not-allowed !important;
        opacity: 1 !important;                 /* Override browser default transparency */
        -webkit-text-fill-color: #94a3b8;      /* Safari fix */
      }

      /* Robust Print Styles */
      @media print {
        body * {
          visibility: hidden;
        }
        #printable-section, #printable-section * {
          visibility: visible;
        }
        #printable-section {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          background-color: white;
          z-index: 9999;
        }
        /* Hide UI elements during print just in case visibility fails */
        .no-print {
          display: none !important;
        }
      }
    </style>
